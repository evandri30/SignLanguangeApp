services:
  db:
    image: postgres:16-alpine    
    restart: unless-stopped        
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}      
      POSTGRES_DB: detection-sibi
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]  
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./Server               
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy 
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@db:5432/detection-sibi
      CORS_ORIGINS: ${CORS_ORIGINS}
      COOKIE_SECURE: "True"
      COOKIE_SAMESITE: "none"
    volumes:
      - server_images:/app/images  
  
  client:
    build:
      context: ./Client            
      args:
        VITE_API_URL: ${VITE_API_URL}   
    restart: unless-stopped

  
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"                    
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro   
    depends_on:
      - client
      - server

volumes:
  pg_data:
  server_images:
