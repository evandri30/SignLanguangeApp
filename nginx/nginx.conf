events {
    worker_connections 1024;
}

http {
    upstream client {
        server client:80;
    }

    upstream server {
        server server:8000;
    }

    server {
        listen 80;
        server_name _;

        # WebSocket untuk detection → FastAPI
        location /ws/ {
            proxy_pass http://server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # API routes → FastAPI
        location /api/ {
            proxy_pass http://server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Detection endpoint → FastAPI
        location /detect {
            proxy_pass http://server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            client_max_body_size 10M;
        }

        # Static images → FastAPI
        location /images/ {
            proxy_pass http://server;
            proxy_set_header Host $host;
        }

        # Everything else → React Client
        location / {
            proxy_pass http://client;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
